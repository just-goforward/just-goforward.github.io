<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>소장품 키트 계산기</title>
    <link rel="stylesheet" href="collection.min.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Collection Kit Optimizer</p>
          <h1>소장품 키트 계산기</h1>
        </div>
        <div class="theme-control" aria-label="테마 선택">
          <span class="theme-label">테마</span>
          <button class="theme-button" type="button" data-theme-mode="system">자동</button>
          <button class="theme-button" type="button" data-theme-mode="light">라이트</button>
          <button class="theme-button" type="button" data-theme-mode="dark">다크</button>
        </div>
      </header>

      <section class="workspace-grid">
        <section class="panel state-panel">
          <div class="section-heading">
            <h2>현재 소장품</h2>
          </div>

          <div class="grade-row" role="group" aria-label="소장품 등급">
            <button class="seg-button active" type="button" data-grade="R">R</button>
            <button class="seg-button" type="button" data-grade="SR">SR</button>
          </div>

          <div class="level-grid" id="levelGrid" aria-label="현재 단계"></div>

          <div class="field-grid exp-grid">
            <label>
              <span>현재 경험치</span>
              <input id="currentExp" type="number" min="0" max="900" step="100" inputmode="numeric" value="0" />
            </label>
            <label class="readonly-field">
              <span>레벨업 필요 경험치</span>
              <strong id="requiredExpLabel">1,000</strong>
            </label>
          </div>
        </section>

        <section class="panel stock-panel">
          <div class="section-heading">
            <h2>보유 키트</h2>
          </div>

          <div id="stockEditNotice" class="stock-edit-notice" hidden>
            대성공이 발생했습니다. 보유 키트 수를 직접 수정해 주세요.
          </div>

          <div class="kit-grid">
            <label class="kit-input blue-kit">
              <span><i></i>초심자용 관리 키트</span>
              <input id="blueStock" type="number" min="0" step="1" inputmode="numeric" value="0" />
              <small>1회 경험치 200</small>
            </label>
            <label class="kit-input purple-kit">
              <span><i></i>중급자용 관리 키트</span>
              <input id="purpleStock" type="number" min="0" step="1" inputmode="numeric" value="0" />
              <small>1회 경험치 500</small>
            </label>
            <label class="kit-input yellow-kit">
              <span><i></i>상급자용 관리 키트</span>
              <input id="yellowStock" type="number" min="0" step="1" inputmode="numeric" value="0" />
              <small>1회 경험치 1,000</small>
            </label>
          </div>
        </section>

        <section class="panel solve-panel">
          <div class="section-heading">
            <h2>계산</h2>
          </div>

          <div class="solve-note">현재 소장품 단계와 보유 키트를 고려하여 SR 15까지 최적의 선택지를 제공합니다.</div>

          <div class="button-row">
            <button id="calculateButton" class="primary-button" type="button">계산</button>
            <button id="resetButton" class="secondary-button" type="button">초기화</button>
          </div>

          <div class="progress-box">
            <div class="progress-line">
              <span id="runState">대기</span>
              <span id="candidateCount">0</span>
            </div>
            <div class="progress-track">
              <div id="progressFill" class="progress-fill"></div>
            </div>
          </div>
        </section>

        <section class="panel result-panel">
          <div class="section-heading">
            <h2>결과</h2>
          </div>
          <div id="resultBox" class="empty-result">입력값을 넣고 계산을 실행하세요.</div>
        </section>

        <section class="panel detail-panel">
          <div class="section-heading">
            <h2>세부 정보</h2>
          </div>
          <div id="detailBox" class="empty-result">계산 후 선택 근거와 검산 결과가 표시됩니다.</div>
        </section>

        <section id="globalStatsPanel" class="panel stats-panel" hidden>
          <div class="section-heading">
            <h2>전체 통계</h2>
          </div>
          <div id="globalStatsBox" class="empty-result">통계 서버를 연결하면 전체 사용자 결과가 표시됩니다.</div>
        </section>
      </section>
    </main>

    <div class="loading-overlay" id="loadingOverlay" hidden>
      <div class="loading-box">
        <div class="spinner" aria-hidden="true"></div>
        <strong>계산 중</strong>
        <span id="loadingText">보유 키트 상태를 MDP로 평가하고 있습니다.</span>
      </div>
    </div>

    <script>
      window.COLLECTION_STATS_CONFIG = {
        endpoint: "",
        turnstileSiteKey: "",
      };
    </script>
    <script src="collection-solver.min.js"></script>
    <script src="collection-app.min.js"></script>
  </body>
</html>
